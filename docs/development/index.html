<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentaChart Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --card-bg: #ffffff;
      --card-border: #e8e6e1;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --card-shadow-active: 0 8px 40px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.04);
      --card-shadow-hover: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.06);
      --text-1: #1a1a1a;
      --text-2: #6b6b6b;
      --text-3: #9ca3af;
      --accent: #2563eb;
      --badge-multi: #d946ef;
      --badge-single: #3b82f6;
      --success: #22c55e;
      --divider: #f0eeeb;
      --font-d: 'Sora', sans-serif;
      --font-b: 'DM Sans', sans-serif;
      --r-sm: 6px; --r-lg: 16px; --r-xl: 24px;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-b);
      background: linear-gradient(180deg, #faf9f7 0%, #efeee9 100%);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: clip;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.02) 1px, transparent 0);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px 48px;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: var(--r-xl);
      margin-bottom: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }
    .patient-sel {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 5px 12px 5px 5px;
      border-radius: var(--r-lg); transition: background 0.2s;
    }
    .patient-sel:hover { background: rgba(0,0,0,0.04); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: grid; place-items: center;
      color: #fff; font: 600 13px/1 var(--font-d);
    }
    .patient-name { font: 500 14px/1 var(--font-d); }
    .chevron { color: var(--text-3); font-size: 9px; }
    .date-display {
      font: 600 17px/1 var(--font-d);
      letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 6px;
    }
    .date-diamond { color: var(--text-3); font-size: 8px; }
    .h-actions { display: flex; gap: 2px; }
    .h-actions button {
      width: 34px; height: 34px; border: none; background: transparent;
      border-radius: var(--r-sm); cursor: pointer;
      display: grid; place-items: center;
      color: var(--text-2); transition: all 0.2s;
    }
    .h-actions button:hover { background: rgba(0,0,0,0.06); color: var(--text-1); }
    .h-actions svg { width: 18px; height: 18px; }

    /* ── Carousel ── */
    .timeline {
      width: 100vw;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 20px;
    }
    .dental-swiper {
      width: 100%;
      height: 60vh;
      min-height: 340px;
      max-height: 560px;
      padding: 30px 4vw 54px;
      overflow: visible !important;
    }
    .dental-swiper .swiper-wrapper { align-items: stretch; }
    .dental-swiper .swiper-slide {
      width: 75%;
      max-width: 860px;
      height: 100%;
      transition: opacity 0.4s ease;
    }
    .dental-swiper .swiper-slide:not(.swiper-slide-active) { opacity: 0.5; }
    .dental-swiper .swiper-slide-active { opacity: 1; }

    /* ── Card ── */
    .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      height: 100%;
      display: flex; flex-direction: column;
      box-shadow: var(--card-shadow);
      cursor: grab;
      transition: transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94),
                  box-shadow 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
      position: relative; overflow: hidden;
    }
    .chart-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      opacity: 0; transition: opacity 0.3s;
    }
    .swiper-slide-active .chart-card::before { opacity: 1; }
    .swiper-slide-active .chart-card { box-shadow: var(--card-shadow-active); }
    .chart-card:hover {
      transform: scale(1.04);
      box-shadow: var(--card-shadow-hover);
    }
    .chart-card:active { cursor: grabbing; }

    /* Card inner — simple placeholder chart */
    .card-body {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 0;
      margin: 16px 16px 0;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      overflow: hidden;
      background: #fafaf9;
    }
    .tooth-cell {
      border-right: 1px solid #ececec;
      border-bottom: 1px solid #ececec;
      display: grid; place-items: center;
      position: relative;
    }
    .tooth-cell:nth-child(16n) { border-right: none; }
    .tooth-cell:nth-child(n+49) { border-bottom: none; }
    /* Midline emphasis */
    .tooth-cell:nth-child(16n+8) { border-right: 1px dashed #ccc; }

    .tooth-pip {
      width: 55%; height: 60%;
      border-radius: 30% 30% 6px 6px;
      background: #e8e8e5;
      transition: background 0.2s;
    }
    /* Occlusal rows (row 2 & 3) — flatter pips */
    .tooth-cell.oc .tooth-pip {
      border-radius: 4px;
      height: 50%; width: 50%;
    }
    /* Lower front row — flip pip */
    .tooth-cell.lf .tooth-pip {
      border-radius: 6px 6px 30% 30%;
    }

    /* Condition colors */
    .pip-caries  { background: rgba(239,68,68,0.35); }
    .pip-decayed { background: rgba(245,158,11,0.35); }
    .pip-crown   { background: rgba(59,130,246,0.35); }
    .pip-extract { background: rgba(239,68,68,0.20); border: 1.5px dashed #ef4444; }
    .pip-filling { background: rgba(34,197,94,0.35); }

    .card-footer {
      text-align: center;
      font: 500 13px/1 var(--font-d);
      color: var(--text-2);
      padding: 14px 0;
      letter-spacing: 0.02em;
      transition: color 0.3s;
    }
    .swiper-slide-active .card-footer { color: var(--accent); font-weight: 600; }

    /* Pagination */
    .dental-swiper .swiper-pagination { bottom: 0 !important; }
    .dental-swiper .swiper-pagination-bullet {
      width: 8px; height: 8px; background: var(--text-3);
      opacity: 0.25; transition: all 0.3s;
    }
    .dental-swiper .swiper-pagination-bullet-active {
      opacity: 1; background: var(--accent);
      width: 24px; border-radius: 4px;
    }

    /* ── Notes Table ── */
    .notes {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--card-shadow);
      animation: fadeUp 0.5s ease both;
      transition: opacity 0.25s ease;
    }
    .notes.fading { opacity: 0.35; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .notes table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .notes thead { background: #fafaf8; }
    .notes thead tr { border-bottom: 1px solid var(--divider); }
    .notes th {
      padding: 13px 18px; text-align: left;
      font: 500 11.5px/1 var(--font-d);
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-2);
    }
    .notes td {
      padding: 15px 18px;
      border-bottom: 1px solid var(--divider);
      vertical-align: middle;
    }
    .notes tbody tr { transition: background 0.15s; }
    .notes tbody tr:hover { background: #fafaf8; }
    .tooth-num { font: 600 14px/1 var(--font-d); }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font: 600 11.5px/1 var(--font-d); color: #fff;
    }
    .badge-multi  { background: var(--badge-multi); }
    .badge-single { background: var(--badge-single); }
    .chk {
      width: 22px; height: 22px;
      border: 2px solid #d1d5db; border-radius: var(--r-sm);
      display: grid; place-items: center;
    }
    .chk.on { background: var(--success); border-color: var(--success); }
    .chk svg { width: 14px; height: 14px; color: #fff; display: none; }
    .chk.on svg { display: block; }
    .total { font: 600 14px/1 var(--font-d); white-space: nowrap; }
    .dots {
      color: var(--text-3); cursor: pointer;
      font-size: 20px; letter-spacing: 1.5px; transition: color 0.2s;
    }
    .dots:hover { color: var(--text-1); }
    .notes tfoot td {
      padding: 15px 18px; background: #fafaf8;
      border-top: 2px solid var(--divider); border-bottom: none;
    }
    .gt-label { text-align: right; font: 500 12.5px/1 var(--font-d); color: var(--text-2); }
    .gt-amount { font: 700 15px/1 var(--font-d); }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .app { padding: 12px 12px 36px; }
      .header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
      .dental-swiper .swiper-slide { width: 88%; }
      .dental-swiper { height: 50vh; min-height: 280px; }
      .notes th, .notes td { padding: 11px 12px; }
      .notes table { font-size: 13px; }
      .timeline { margin-bottom: 16px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="patient-sel">
      <div class="avatar">RH</div>
      <span class="patient-name">Russel Herrera</span>
      <span class="chevron">&#9671;</span>
    </div>
    <div class="date-display" id="dateDisplay">
      <span id="dateText">February 15, 2026</span>
      <span class="date-diamond">&#9671;</span>
    </div>
    <div class="h-actions">
      <button title="Documents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></button>
      <button title="Notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button title="Attachments"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
      <button title="Expand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
      <button title="More"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
    </div>
  </header>

  <section class="timeline">
    <div class="swiper dental-swiper">
      <div class="swiper-wrapper" id="swiperWrapper"></div>
      <div class="swiper-pagination"></div>
    </div>
  </section>

  <section class="notes" id="notesSection">
    <table>
      <thead>
        <tr>
          <th>Tooth</th><th>Surface</th><th>Condition</th>
          <th>Treatment Plan</th><th>Work Done</th><th>Status</th>
          <th>Total</th><th></th>
        </tr>
      </thead>
      <tbody id="notesBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="6" class="gt-label">Grand Total</td>
          <td class="gt-amount" id="grandTotal"></td>
          <td class="dots">···</td>
        </tr>
      </tfoot>
    </table>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
var NS = 'http://www.w3.org/2000/svg';

/* ═══ DATA ═══ */
var charts = [
  {
    date: 'September 12, 2025',
    conditions: { 1:'extract', 16:'caries', 24:'filling' },
    notes: [
      { tooth:'#1',  surface:'Single', condition:'Impacted', treatment:'Extraction', done:true,  total:1500 },
      { tooth:'#16', surface:'Multi',  condition:'Caries',   treatment:'Root Canal', done:false, total:2500 },
      { tooth:'#24', surface:'Single', condition:'Cavity',   treatment:'Filling',    done:true,  total:350 },
    ]
  },
  {
    date: 'October 5, 2025',
    conditions: { 7:'filling', 11:'crown', 28:'decayed' },
    notes: [
      { tooth:'#7',  surface:'Single', condition:'Chip',      treatment:'Bonding', done:true,  total:300 },
      { tooth:'#11', surface:'Multi',  condition:'Fractured', treatment:'Crown',   done:true,  total:1800 },
      { tooth:'#28', surface:'Single', condition:'Decayed',   treatment:'Filling', done:false, total:450 },
    ]
  },
  {
    date: 'November 20, 2025',
    conditions: { 2:'decayed', 15:'extract', 22:'caries' },
    notes: [
      { tooth:'#2',  surface:'Multi',  condition:'Decayed',        treatment:'Root Canal', done:true,  total:2200 },
      { tooth:'#15', surface:'Single', condition:'Non-restorable', treatment:'Extraction', done:true,  total:800 },
      { tooth:'#22', surface:'Single', condition:'Caries',         treatment:'Filling',    done:false, total:400 },
    ]
  },
  {
    date: 'December 15, 2025',
    conditions: { 12:'crown', 19:'filling', 25:'caries' },
    notes: [
      { tooth:'#12', surface:'Single', condition:'Worn',   treatment:'Crown',   done:true,  total:1800 },
      { tooth:'#19', surface:'Multi',  condition:'Cavity', treatment:'Filling', done:true,  total:600 },
      { tooth:'#25', surface:'Single', condition:'Caries', treatment:'Filling', done:false, total:350 },
    ]
  },
  {
    date: 'January 10, 2026',
    conditions: { 5:'decayed', 8:'caries', 30:'extract' },
    notes: [
      { tooth:'#5',  surface:'Multi',  condition:'Decayed', treatment:'Onlay',      done:true,  total:1200 },
      { tooth:'#8',  surface:'Single', condition:'Caries',  treatment:'Filling',    done:true,  total:400 },
      { tooth:'#30', surface:'Single', condition:'Impacted',treatment:'Extraction', done:false, total:1500 },
    ]
  },
  {
    date: 'January 28, 2026',
    conditions: { 3:'filling', 14:'caries', 27:'crown' },
    notes: [
      { tooth:'#3',  surface:'Single', condition:'Cavity',    treatment:'Filling',    done:true,  total:350 },
      { tooth:'#14', surface:'Multi',  condition:'Caries',    treatment:'Root Canal', done:false, total:2500 },
      { tooth:'#27', surface:'Single', condition:'Fractured', treatment:'Crown',      done:true,  total:1800 },
    ]
  },
  {
    date: 'February 15, 2026',
    conditions: { 9:'caries', 18:'decayed', 21:'decayed' },
    notes: [
      { tooth:'#9',  surface:'Multi',  condition:'Caries',  treatment:'Extraction', done:false, total:800 },
      { tooth:'#21', surface:'Single', condition:'Decayed', treatment:'Crown',      done:false, total:null },
      { tooth:'#18', surface:'Single', condition:'Decayed', treatment:'Pasta',      done:true,  total:500 },
    ]
  },
];

/* ═══ TOOTH HELPERS ═══ */
// Upper row: teeth 1-16 left to right. Lower row: 32-17 left to right.
function tNum(col, upper) { return upper ? col + 1 : 32 - col; }

/* ═══ CARD BUILDER (simple grid) ═══ */
function buildCard(chart) {
  var card = document.createElement('div');
  card.className = 'chart-card';

  var body = document.createElement('div');
  body.className = 'card-body';

  // 4 rows x 16 cols = 64 cells
  var rowTypes = ['uf','oc','oc','lf'];
  for (var r = 0; r < 4; r++) {
    var isUpper = r < 2;
    for (var c = 0; c < 16; c++) {
      var cell = document.createElement('div');
      cell.className = 'tooth-cell ' + rowTypes[r];

      var pip = document.createElement('div');
      pip.className = 'tooth-pip';

      var num = tNum(c, isUpper);
      var cond = chart.conditions[num];
      if (cond) pip.classList.add('pip-' + cond);

      cell.appendChild(pip);
      body.appendChild(cell);
    }
  }

  card.appendChild(body);

  var footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.textContent = chart.date;
  card.appendChild(footer);

  return card;
}

/* ═══ TABLE ═══ */
function makeTd(text, cls) {
  var td = document.createElement('td');
  if (cls) td.className = cls;
  td.textContent = text;
  return td;
}

function renderTable(notes) {
  var sec = document.getElementById('notesSection');
  var tbody = document.getElementById('notesBody');
  sec.classList.add('fading');

  setTimeout(function() {
    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
    var gt = 0;

    notes.forEach(function(n) {
      var tr = document.createElement('tr');
      tr.appendChild(makeTd(n.tooth, 'tooth-num'));

      var tdSurf = document.createElement('td');
      var badge = document.createElement('span');
      badge.className = 'badge ' + (n.surface === 'Multi' ? 'badge-multi' : 'badge-single');
      badge.textContent = n.surface;
      tdSurf.appendChild(badge);
      tr.appendChild(tdSurf);

      tr.appendChild(makeTd(n.condition));
      tr.appendChild(makeTd(n.treatment));

      var tdChk = document.createElement('td');
      var chk = document.createElement('div');
      chk.className = 'chk' + (n.done ? ' on' : '');
      var svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '3');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      var poly = document.createElementNS(NS, 'polyline');
      poly.setAttribute('points', '20 6 9 17 4 12');
      svg.appendChild(poly);
      chk.appendChild(svg);
      tdChk.appendChild(chk);
      tr.appendChild(tdChk);

      tr.appendChild(makeTd(''));

      if (n.total) gt += n.total;
      var tdT = document.createElement('td');
      tdT.className = 'total';
      tdT.textContent = n.total ? '\u20B1 ' + n.total.toLocaleString('en', { minimumFractionDigits: 2 }) : '';
      tr.appendChild(tdT);

      var tdD = document.createElement('td');
      tdD.className = 'dots';
      tdD.textContent = '\u00B7\u00B7\u00B7';
      tr.appendChild(tdD);

      tbody.appendChild(tr);
    });

    document.getElementById('grandTotal').textContent =
      '\u20B1 ' + gt.toLocaleString('en', { minimumFractionDigits: 2 });
    sec.classList.remove('fading');
  }, 180);
}

/* ═══ INIT ═══ */
document.addEventListener('DOMContentLoaded', function() {
  var wrapper = document.getElementById('swiperWrapper');

  charts.forEach(function(chart) {
    var slide = document.createElement('div');
    slide.className = 'swiper-slide';
    slide.appendChild(buildCard(chart));
    wrapper.appendChild(slide);
  });

  new Swiper('.dental-swiper', {
    effect: 'coverflow',
    grabCursor: true,
    centeredSlides: true,
    slidesPerView: 'auto',
    initialSlide: charts.length - 1,
    coverflowEffect: {
      rotate: 35,
      stretch: 0,
      depth: 350,
      modifier: 1,
      scale: 0.72,
      slideShadows: false,
    },
    pagination: { el: '.swiper-pagination', clickable: true },
    keyboard: { enabled: true },
    on: {
      slideChange: function() {
        var c = charts[this.activeIndex];
        if (!c) return;
        document.getElementById('dateText').textContent = c.date;
        renderTable(c.notes);
      }
    }
  });

  renderTable(charts[charts.length - 1].notes);
});
</script>
</body>
</html>
