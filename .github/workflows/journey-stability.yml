name: Journey Stability Budget

# Manual, on-demand "bank the stability budget" run. Boots the real stack ONCE
# (postgres + api-ts), then loops the full Journey Harness N times (default 20),
# each against a freshly reseeded DB, and reports the pass-rate. The job is green
# only when EVERY run is clean — that green check IS the banked 20/20 proof that
# gates arming the Plan C lock, earned on demand instead of waiting ~20 organic
# merges. One serial job on one runner: the expensive setup is paid once, so this
# stays cheap on CI minutes (≈ N × 1.7 min + ~5 min setup).
on:
  workflow_dispatch:
    inputs:
      runs:
        description: 'Consecutive harness runs to bank (a single flake fails the job)'
        required: false
        default: '20'

env:
  BUN_INSTALL_CACHE_DIR: /tmp/bun-cache

jobs:
  stability-budget:
    name: Stability Budget
    runs-on: ubuntu-latest
    # 20 runs × (~1.3 min harness + ~0.3 min reseed) + ~5 min setup ≈ 40 min;
    # 90 gives generous headroom for a slow runner or a larger `runs` input.
    timeout-minutes: 90

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: stability-test-secret-do-not-use-in-prod
      # Minimal storage config so api-ts boots without crashing. No MinIO is
      # provisioned → the ceph journeys (B01–B04) record SKIPPED, which the
      # harness tolerates (honest environment skip, not a regression).
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/dentalemon && bunx playwright install --with-deps chromium

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Boot api-ts (auto-migrates on start)
        run: |
          cd services/api-ts
          bun dev > /tmp/api-stability.log 2>&1 &
          echo $! > /tmp/api-stability.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && break || sleep 1
          done
          curl -fsS "$API_URL/livez" || { echo "api-ts never became ready"; tail -100 /tmp/api-stability.log; exit 1; }

      # The orchestrator reseeds before every harness run (no pre-seed needed) and
      # exits 0 iff all N runs were clean. Each harness run boots the Vite frontend
      # via the Playwright webServer and reuses the api-ts booted above.
      - name: Bank the stability budget
        run: bun apps/dentalemon/scripts/run-stability-budget.ts
        env:
          STABILITY_RUNS: ${{ github.event.inputs.runs }}

      - name: Upload stability budget report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stability-budget-results
          path: |
            apps/dentalemon/stability-budget-results.json
            apps/dentalemon/journey-results.json
            apps/dentalemon/.journey-tmp/
          retention-days: 14

      - name: Upload Playwright artifacts (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stability-playwright-artifacts
          path: apps/dentalemon/test-results/
          retention-days: 7

      - name: api-ts logs (always)
        if: always()
        run: tail -200 /tmp/api-stability.log || true

      - name: Stop api-ts
        if: always()
        run: kill "$(cat /tmp/api-stability.pid)" || true
