name: Contract Tests

# Spec-first contract tests. Layers (all BLOCKING unless noted):
#   1. Hurl core — Postgres-only scenarios — BLOCKING.
#   2. Hurl infra-gated MinIO (storage, dental-imaging, dental-assistant) — BLOCKING.
#   3. Hurl auth email round-trip (auth-verification, auth-password-reset) via
#      Mailpit — BLOCKING.
#   4. Hurl Stripe (billing-lifecycle) via stripe-mock — NON-BLOCKING (mock 500s).
#   5. Schemathesis schema fuzzing — shadow check (allowed to fail by design:
#      it surfaces spec-precision nits, not impl bugs).
#
# All run against whichever HTTP implementation is booted on $API_URL,
# so the same workflow can be retargeted at a Rust impl, a remote staging
# environment, etc., by swapping the boot step.
#
# The split is by `CONTRACT_SKIP` / `CONTRACT_ONLY` (substring filters in
# scripts/run-contract-tests.ts). The infra-gated files were identified
# empirically — each needs a backing service (MinIO / Mailpit / Stripe); the
# rest pass on Postgres alone.
#
# EMAIL ROUND-TRIP (auth-verification, auth-password-reset): these run against
# the SAME verification-OFF server as the core scenarios — verified end-to-end.
# A verification email is queued on EVERY sign-up (auth.ts sendOnSignUp:true,
# independent of requireEmailVerification), and password-reset's final sign-in
# needs a session, which Better-Auth only issues when verification is OFF — so
# verification-OFF is in fact REQUIRED for these, not the opposite. They only
# need Mailpit reachable + the email queue drained quickly
# (EMAIL_PROCESSOR_INTERVAL_MS, set below). (An earlier note claimed they needed
# a separate verification-ON boot; that was incorrect.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: contract-test-secret-do-not-use-in-prod
      # The contract runner's admin preflight signs up admin@contract-tests.local;
      # it is only granted the admin role (needed for admin-gated ops, e.g. org
      # creation EM-ORG-002) when its email is in AUTH_ADMIN_EMAILS.
      AUTH_ADMIN_EMAILS: admin@contract-tests.local
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      # Email → Mailpit (auth-verification / auth-password-reset scenarios).
      EMAIL_PROVIDER: smtp
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAILPIT_API: http://localhost:8025
      # Drain the email queue fast so the auth round-trip scenarios resolve in
      # ~1s instead of waiting on the 30s default processor interval (the hurl
      # poll budget is 60s, so the default would work but be slow/flake-prone).
      EMAIL_PROCESSOR_INTERVAL_MS: '1000'
      # Verification OFF so sign-up returns a session cookie immediately — the
      # core scenarios, the admin preflight, AND the auth email round-trip
      # scenarios (password-reset's final sign-in needs a session) all depend on
      # it. Matches the local dev-server config the suite was verified green against.
      AUTH_REQUIRE_EMAIL_VERIFICATION: 'false'
      # Stripe → stripe-mock (billing-lifecycle merchant-accounts scenario).
      STRIPE_SECRET_KEY: sk_test_stripe_mock
      STRIPE_URL: http://localhost:12111
      BUN_INSTALL_CACHE_DIR: /tmp/bun-cache

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      # Pin Hurl to 8.0.1 to match the version contributors run locally. Hurl
      # 6.0.0's `contains` predicate type-errored on JSONPath COLLECTIONS
      # ("$[*].id contains X", "$.warnings contains X", "$.fieldErrors[*].field
      # contains X") — that membership check moved from the now-removed `includes`
      # predicate to `contains` in later releases. 6.0.0 failed 6 core scenarios
      # purely on this tooling skew; 8.0.1 evaluates them correctly.
      - name: Install Hurl
        run: |
          curl -fsSL -o /tmp/hurl.deb \
            https://github.com/Orange-OpenSource/hurl/releases/download/8.0.1/hurl_8.0.1_amd64.deb
          sudo dpkg -i /tmp/hurl.deb

      - name: Install Schemathesis
        run: pipx install schemathesis

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      # Non-blocking until the ~35 existing dev-tool advisories are triaged.
      # Flip continue-on-error to false once backlog is cleared (tracked follow-up).
      - name: Security audit
        continue-on-error: true
        run: bun audit

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Start MinIO
        run: |
          docker run -d \
            -p 9000:9000 \
            --name minio \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for i in {1..20}; do
            curl -fsS http://localhost:9000/minio/health/live && break || sleep 1
          done

      - name: Start Mailpit
        run: |
          docker run -d \
            -p 1025:1025 -p 8025:8025 \
            --name mailpit \
            axllent/mailpit:v1.21.0
          for i in {1..20}; do
            curl -fsS http://localhost:8025/api/v1/info && break || sleep 1
          done

      - name: Start stripe-mock
        run: |
          docker run -d \
            -p 12111:12111 \
            --name stripe-mock \
            stripe/stripe-mock:v0.193.0
          for i in {1..20}; do
            curl -fsS http://localhost:12111/v1/ && break || sleep 1
          done

      # ----- Implementation under test: services/api-ts (TypeScript) -----
      # Swap this step when testing a different impl (e.g. services/api-rs).

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Check for uncommitted schema drift
        run: |
          cd services/api-ts && bun run db:generate
          git diff --exit-code src/generated/migrations

      - name: Boot the implementation
        run: |
          cd services/api-ts
          bun dev > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && exit 0
            sleep 1
          done
          echo "API never became ready"
          tail -200 /tmp/api.log
          exit 1

      # ----- Contract checks -----

      # Core (Postgres-only, 39 files) — BLOCKING. Verified green locally; these
      # have no infra dependency so a failure here is a real contract regression.
      - name: Hurl contract — core (blocking)
        env:
          CONTRACT_SKIP: storage,dental-imaging,dental-assistant,auth-verification,auth-password-reset,billing-lifecycle
        run: bun run test:contract

      # Infra-gated MinIO (storage, dental-imaging, dental-assistant) — BLOCKING.
      # MinIO is provisioned above and these run against the verification-OFF server.
      # Confirmed green on ubuntu (run 27443529051). The 2 Mailpit verification
      # scenarios (auth-verification, auth-password-reset) are excluded: they need a
      # verification-ON server boot (deferred follow-up).
      - name: Hurl contract — infra-gated MinIO (blocking)
        env:
          CONTRACT_ONLY: storage,dental-imaging,dental-assistant
        run: bun run test:contract

      # Auth email round-trip (auth-verification, auth-password-reset) — BLOCKING.
      # Runs against the SAME verification-OFF server booted above (Mailpit is
      # provisioned, the email queue is drained every 1s). Drives signup→verify
      # and request-reset→reset→sign-in through real emails caught by Mailpit.
      # Verified end-to-end locally; see the header note for why verification-OFF
      # is correct here (password-reset's final sign-in needs a session).
      - name: Hurl contract — auth email round-trip (Mailpit, blocking)
        env:
          CONTRACT_ONLY: auth-verification,auth-password-reset
        run: bun run test:contract

      # Stripe (billing-lifecycle) — NON-BLOCKING. Exercises Stripe Connect merchant
      # onboarding against stripe-mock, which intermittently 500s on
      # POST /billing/merchant-accounts (the mock's Account API is incomplete and
      # boot-timing sensitive). The earlier promotion to blocking off a single green
      # run proved unstable, so it is demoted to continue-on-error. Re-promote once
      # stripe-mock is reliable or replaced with a recorded-fixture mock.
      - name: Hurl contract — Stripe (non-blocking)
        continue-on-error: true
        env:
          CONTRACT_ONLY: billing-lifecycle
        run: bun run test:contract

      # Shadow check by design: Schemathesis fuzzing surfaces spec-precision nits
      # (under-declared 401s, datetime query params), not impl bugs — kept advisory.
      - name: Schemathesis fuzz (shadow)
        continue-on-error: true
        run: bun run test:contract:fuzz

      - name: API logs (always)
        if: always()
        run: tail -500 /tmp/api.log || true

      - name: Stop the implementation
        if: always()
        run: kill "$(cat /tmp/api.pid)" || true
