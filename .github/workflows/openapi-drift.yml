name: Generated Artifact Drift Detection

# Fails if the COMMITTED generated artifacts are out of sync with the TypeSpec
# sources. The old gate diffed specs/api/dist/ — but dist/ is gitignored (.gitignore
# bare `dist`), so `git diff specs/api/dist/` matched 0 tracked files and ALWAYS
# passed: a false-green no-op (audit G-06). It also never regenerated the SDK (G-07).
#
# This regenerates the full chain (TypeSpec -> OpenAPI/types -> api-ts
# routes/validators -> TS SDK) and diffs ONLY the TypeSpec-derived tracked outputs:
#   - services/api-ts/src/generated/openapi   (routes, validators, types)
#   - packages/sdk-ts/src/generated           (the client SDK)
# NOTE: services/api-ts/src/generated/better-auth/openapi.json is deliberately
# EXCLUDED — it is generated by better-auth (not TypeSpec) and embeds the bind host
# (localhost vs 0.0.0.0 in CI), so it is environment-dependent, not drift. The
# TypeSpec-derived outputs are byte-deterministic, so a no-spec PR produces no diff.
#
# Runs on EVERY PR (no `paths:` filter): `detect-drift` is a required branch-
# protection check, and a path-filtered workflow is *skipped* (never reports) on PRs
# that don't touch the filtered paths, leaving the required check permanently pending.
# The job id MUST stay `detect-drift` so the required check keeps matching.

on:
  pull_request:

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate OpenAPI + TypeScript types
        working-directory: specs/api
        run: bun run build

      - name: Regenerate api-ts routes/validators
        working-directory: services/api-ts
        run: bun run generate

      - name: Regenerate TypeScript SDK
        working-directory: packages/sdk-ts
        run: bun run generate

      - name: Check for generated-artifact drift
        run: |
          PATHS="services/api-ts/src/generated/openapi packages/sdk-ts/src/generated"
          if ! git diff --exit-code -- $PATHS; then
            echo ""
            echo "Committed generated artifacts are out of sync with the TypeSpec sources."
            echo "Regenerate and commit the updated files:"
            echo ""
            echo "  (cd specs/api && bun run build) \\"
            echo "    && (cd services/api-ts && bun run generate) \\"
            echo "    && (cd packages/sdk-ts && bun run generate)"
            echo ""
            git diff --stat -- $PATHS
            exit 1
          fi
          echo "Generated artifacts are in sync with TypeSpec."
