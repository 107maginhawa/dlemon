name: OpenAPI Drift Detection

# Fails if specs/api/dist/ is out of sync with TypeSpec sources.
# Forces contributors to commit regenerated artifacts after touching .tsp files.
#
# Runs on EVERY pull request (no `paths:` filter). `detect-drift` is a required
# branch-protection check, and a path-filtered workflow is *skipped* (never
# reports) on PRs that don't touch the filtered paths — which leaves the required
# check permanently pending and blocks every frontend-only PR. Running always
# (on a no-spec-change PR the regen produces no diff, so it passes fast) keeps the
# gate honest and unblockable. See the regen step below for the actual drift check.

on:
  pull_request:

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install specs/api dependencies
        working-directory: specs/api
        run: bun install --frozen-lockfile

      - name: Regenerate OpenAPI + TypeScript types
        working-directory: specs/api
        run: bun run build

      - name: Check for OpenAPI drift
        run: |
          if ! git diff --exit-code specs/api/dist/; then
            echo ""
            echo "OpenAPI spec is out of sync with TypeSpec sources."
            echo "Run the following, then commit the updated dist/ files:"
            echo ""
            echo "  cd specs/api && bun run build"
            echo ""
            git diff --stat specs/api/dist/
            exit 1
          fi
          echo "OpenAPI spec is up to date."
