name: API Unit Tests (Postgres)

# Phase D CI gate: runs api-ts unit/repo tests with a real Postgres instance.
# Mirrors the services block from contract.yml (postgres:16-alpine, no Valkey).
# `bun run test` → scripts/test-with-db.ts, which discovers every src/**/*.test.ts
# itself (bun's shell can't expand `**`) and runs each file in its own database
# cloned from the migrated `monobase_test` template, so files can't contaminate
# each other. tests/quarantine/ lives outside src/ and is excluded.
#
# Two jobs:
#   - api-unit-tests (name "API Unit Tests") — the BLOCKING gate. One full run.
#   - api-coverage    (name "API Coverage")  — NON-BLOCKING coverage report,
#     split out so the blocking gate no longer serializes a second full run
#     (the suite is ~10x slower on CI than locally, so two runs needed a 45m
#     timeout; one run fits comfortably in 30m and the coverage run goes wide
#     in parallel). Not a required status check.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-unit-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest
    # 30m: one gate run of the 344-file suite, which clones a fresh DB per file
    # (so files can't contaminate each other) and is ~10x slower on CI's
    # dockerized postgres than locally (~80s local; the gate run alone is ~20m on
    # CI). The duplicate coverage run that used to follow here now lives in the
    # parallel `api-coverage` job below, so this blocking gate is a single run.
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase_test"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase_test
      AUTH_SECRET: unit-test-secret-do-not-use-in-prod
      # Storage env needed so api-ts boots; actual S3 calls will fail (storage tests are quarantined)
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      BUN_INSTALL_CACHE_DIR: /tmp/bun-cache
      # Per-file DB clones: parallel test execution. GitHub runners have ~4 CPUs.
      TEST_CONCURRENCY: '4'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: TypeScript typecheck
        run: cd services/api-ts && bun run typecheck

      - name: Migrate test database
        run: cd services/api-ts && bun run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase_test

      - name: Run unit + repo tests
        # bun run test → scripts/test-with-db.ts (recursive discovery + per-file
        # DB clones). tests/quarantine/ is outside src/ and auto-excluded.
        # .allowed-failures lists known pre-existing failures; they are logged
        # but do not block CI. When a failure exits the allowed list, remove it here.
        run: |
          cd services/api-ts
          GITHUB_ACTIONS=false bun run test 2>&1 | tee /tmp/test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          # Check each allowed failure; if ALL remaining failures are in the list, pass.
          FAIL_LINES=$(grep '^(fail)' /tmp/test-output.txt || true)
          if [ -n "$FAIL_LINES" ]; then
            ALLOWED=$(cat tests/.allowed-failures 2>/dev/null || true)
            UNEXPECTED=$(echo "$FAIL_LINES" | while IFS= read -r line; do
              # Strip trailing bracket tags like [BR-002] [0.63ms] before matching
              CLEAN=$(echo "$line" | sed 's/\( \[[^]]*\]\)*$//')
              if ! echo "$ALLOWED" | grep -qF "$CLEAN"; then
                echo "$line"
              fi
            done)
            if [ -n "$UNEXPECTED" ]; then
              echo "UNEXPECTED TEST FAILURES (not in tests/.allowed-failures):"
              echo "$UNEXPECTED"
              exit 1
            else
              echo "All failures are in the allowed list. Passing."
              exit 0
            fi
          fi
          exit $EXIT_CODE

      - name: Quarantine count guardrail
        # Fail if tests/quarantine/ has grown beyond the committed count.
        # Decrement .quarantine-count when removing a test from quarantine.
        run: |
          cd services/api-ts
          ACTUAL=$(find tests/quarantine -name "*.test.ts" | wc -l | tr -d ' ')
          ALLOWED=$(cat tests/.quarantine-count 2>/dev/null | tr -d ' ')
          echo "Quarantined tests: $ACTUAL / allowed: $ALLOWED"
          if [ "$ACTUAL" -gt "$ALLOWED" ]; then
            echo "ERROR: quarantine grew from $ALLOWED to $ACTUAL. Move new tests out or update .quarantine-count."
            exit 1
          fi

  api-coverage:
    name: API Coverage
    runs-on: ubuntu-latest
    # NON-BLOCKING coverage report, split from the gate so the blocking job is a
    # single suite run. Runs in parallel with api-unit-tests. Not a required
    # status check (see branch protection). The coverage run itself is allowed to
    # fail (continue-on-error) so threshold/tooling noise never shows red here.
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase_test"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase_test
      AUTH_SECRET: unit-test-secret-do-not-use-in-prod
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      BUN_INSTALL_CACHE_DIR: /tmp/bun-cache
      TEST_CONCURRENCY: '4'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Migrate test database
        run: cd services/api-ts && bun run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase_test

      - name: Generate coverage report
        run: cd services/api-ts && bun run test:coverage 2>&1 | tee coverage-report.txt
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: services/api-ts/coverage-report.txt
          retention-days: 30

  rls-posture:
    name: RLS Posture Gate
    runs-on: ubuntu-latest
    # ADR-010 P5 drift gate: migrate a fresh DB, then assert every PHI table the
    # RLS migrations armed still has ENABLE+FORCE ROW LEVEL SECURITY + a policy
    # (scripts/check-rls-posture.ts). Catches a future migration that disables RLS
    # or drops a policy. Fast (migrate + one catalog query).
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase_test"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Migrate test database
        run: cd services/api-ts && bun run db:migrate

      - name: Check RLS posture (every PHI table still ENABLE+FORCE + policy)
        run: cd services/api-ts && bun run check:rls-posture
