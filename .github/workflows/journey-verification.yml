name: Journey Verification

# The per-PR REAL-STACK Journey Harness gate now lives in the `Journey Harness`
# job in quality.yml (it boots the same postgres + api-ts, runs the same
# run-journey-harness.ts Set A, AND adds the role-denial/auth + payment-coherence
# E2E gates). This file previously ran a second, redundant copy of the harness
# (`Journey Harness (real stack, Set A once)`); that duplicate was removed so the
# harness boots ONCE per PR. Only the advisory KG review radar remains here.

on:
  pull_request:

env:
  BUN_INSTALL_CACHE_DIR: /tmp/bun-cache

jobs:
  # UA_KG_UPGRADE.md U3 — ADVISORY review radar. Maps the PR's changed files to
  # the domain-graph business flows they touch, then flags any flow with NO
  # covering goal-state journey. Lightweight (no stack, no deps — reads committed
  # JSON + the harness roster). NEVER blocks: the script exits 0 and the step is
  # continue-on-error. Output lands in the PR check summary as a visible note.
  kg-review-radar:
    name: KG review radar (advisory — flows ↔ journeys)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Map changed flows to journey coverage (advisory)
        continue-on-error: true
        run: |
          BASE="origin/${{ github.base_ref }}"
          git rev-parse --verify "$BASE" >/dev/null 2>&1 || BASE="${{ github.event.pull_request.base.sha }}"
          {
            echo "## understand-anything review radar (advisory)"
            echo ''
            echo '```'
            bun scripts/kg-review-radar.ts --base="$BASE"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
