name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

env:
  BUN_INSTALL_CACHE_DIR: /tmp/bun-cache

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - run: cd specs/api && bun run build
      - run: cd apps/dentalemon && bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - run: cd apps/dentalemon && bun run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Run unit tests with coverage
        # bunfig.toml sets coverageThreshold (line=75, function=75, branch=60).
        # --coverage flag ensures the gate runs even when bunfig auto-detection varies.
        run: cd apps/dentalemon && bun test --coverage src/
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: apps/dentalemon/coverage/
          retention-days: 7

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Vite production build
        run: cd apps/dentalemon && bun run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Security audit (new advisories block merge — accepted list in docs/audits/SECURITY_ADVISORIES.md)
        run: bash scripts/check-audit.sh

  migration-safety:
    name: Migration Safety Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Lint migration safety
        run: cd services/api-ts && bun run lint:migrations

  traceability:
    name: BR Traceability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Check P0 BR coverage
        run: bun run audit:trace:ci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true # structural: no backend here — Playwright hits a static Vite build only.
    # journey-verification (below) is the AUTHORITATIVE hard-fail E2E gate: real postgres + seed + api-ts.
    # PASS-expected journey regressions fail journey-verification with exit 1.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: cd apps/dentalemon && bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd apps/dentalemon && bun run test:e2e
      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-artifacts
          path: apps/dentalemon/test-results/
          retention-days: 7

  perf-ratchet:
    name: Performance Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # DISABLED until a staging environment is wired. The ratchet needs a
    # running, seeded API to hit. To enable:
    #   1. Change `if: false` -> `if: github.event_name == 'pull_request'`.
    #   2. Set repo secrets PERF_API_URL and PERF_API_TOKEN.
    #   3. Provide PERF_PATIENT_ID / PERF_VISIT_ID / PERF_CHART_ID via env
    #      or seed deterministic IDs in the staging env.
    # Until then the job exists as scaffolding so the script and baseline
    # stay version-controlled and reviewable.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Run perf ratchet
        run: cd services/api-ts && bun run tests/perf/run.ts
        env:
          API_URL: ${{ secrets.PERF_API_URL }}
          API_TOKEN: ${{ secrets.PERF_API_TOKEN }}

  journey-verification:
    name: Journey Harness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # The harness needs a real database (seed + api-ts) and the Vite frontend
    # (Playwright webServer boots it). No MinIO needed — journeys don't touch storage.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: journey-test-secret-do-not-use-in-prod
      # Minimal storage config so api-ts boots without crashing (journeys don't upload files)
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/dentalemon && bunx playwright install --with-deps chromium

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Boot api-ts (auto-migrates on start)
        run: |
          cd services/api-ts
          bun dev > /tmp/api-journey.log 2>&1 &
          echo $! > /tmp/api-journey.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && break || sleep 1
          done
          curl -fsS "$API_URL/livez" || { echo "api-ts never became ready"; tail -100 /tmp/api-journey.log; exit 1; }

      - name: Seed demo data (mixed mode)
        run: bun run db:reseed
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
          SEED_MODE: mixed

      - name: Run journey harness (14 specs, no-reseed — data already seeded)
        # Exit code: 0 = all PASS-expected journeys returned PASS and no specs crashed.
        # Exit 1 = any PASS-expected journey returned BROKEN/ERROR (regression), OR any spec crashed.
        # BROKEN-expected journeys returning BROKEN are always OK (no regression).
        # BROKEN-expected journeys returning PASS (a fix!) are logged but do not block CI —
        # flip expectedVerdict to PASS in the harness EXPECTED map when a journey is fixed.
        run: bun apps/dentalemon/scripts/run-journey-harness.ts --no-reseed

      - name: Upload journey results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: journey-results
          path: |
            apps/dentalemon/journey-results.json
            apps/dentalemon/.journey-tmp/
          retention-days: 14

      - name: Upload Playwright artifacts (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: journey-playwright-artifacts
          path: apps/dentalemon/test-results/
          retention-days: 7

      - name: api-ts logs (always)
        if: always()
        run: tail -200 /tmp/api-journey.log || true

      - name: Stop api-ts
        if: always()
        run: kill "$(cat /tmp/api-journey.pid)" || true
