name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

env:
  BUN_INSTALL_CACHE_DIR: /tmp/bun-cache

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - run: cd specs/api && bun run build
      - run: cd apps/dentalemon && bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      # Root lint covers dentalemon + @monobase/api-ts (eslint, 0 errors gate)
      # and the FSM state-machine token drift guard (scripts/check-fsm-tokens.ts).
      - run: bun run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Run unit tests with coverage
        # bunfig.toml sets coverageThreshold (line=75, function=75, branch=60).
        # --coverage flag ensures the gate runs even when bunfig auto-detection varies.
        run: cd apps/dentalemon && bun test --coverage src/
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: apps/dentalemon/coverage/
          retention-days: 7

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Vite production build
        run: cd apps/dentalemon && bun run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Security audit (new advisories block merge — accepted list in docs/security/SECURITY_ADVISORIES.md)
        run: bash scripts/check-audit.sh

  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Cargo audit (services/cadence + services/api-ts-embedded)
        run: bash scripts/cargo-audit.sh

  migration-safety:
    name: Migration Safety Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Lint migration safety
        run: cd services/api-ts && bun run lint:migrations
      - name: Lint test-harness (no new raw-handler mounts)
        run: cd services/api-ts && bun run lint:test-harness

  schema-drift-gate:
    name: Code-DB Drift Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Plan D — lock the self-heal path the live incident exposed. RLS made
    # code-ahead-of-DB FATAL: a DB missing the app_rls grant migration fails every
    # withTenantTx write with "permission denied". This gate puts the DB one
    # migration BEHIND, boots the current api-ts, and proves it (a) auto-migrates to
    # current on boot, (b) reports the healed schema on /readyz, and (c) actually
    # serves RLS writes — by reseeding through the activated handlers (the exact flow
    # that broke). If auto-migrate-on-boot regresses or a grant migration is wrong,
    # the reseed fails loudly here.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: drift-gate-secret-do-not-use-in-prod
      # No MinIO provisioned — storage is unhealthy so /readyz returns 503 overall,
      # but the schema check in its body still reports independently (asserted below).
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build
      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      # Put the DB one migration behind the code (withholds the last migration).
      - name: Migrate DB to N-1 (simulate code ahead of DB)
        run: cd services/api-ts && bun scripts/migrate-to-n-minus-1.ts

      - name: Boot api-ts (must auto-migrate the withheld migration on start)
        run: |
          cd services/api-ts
          bun dev > /tmp/api-drift.log 2>&1 &
          echo $! > /tmp/api-drift.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && break || sleep 1
          done
          curl -fsS "$API_URL/livez" || { echo "api-ts never became ready"; tail -100 /tmp/api-drift.log; exit 1; }

      - name: Assert /readyz reports the schema HEALED (drift self-resolved on boot)
        run: |
          body="$(curl -s "$API_URL/readyz?verbose")"
          echo "readyz: $body"
          schema="$(echo "$body" | jq -r '.checks.schema')"
          if [ "$schema" != "pass" ]; then
            echo "✗ expected checks.schema=pass after boot auto-migrate, got: $schema"
            tail -100 /tmp/api-drift.log
            exit 1
          fi
          echo "✓ schema healed to current on boot"

      - name: Reseed through the activated handlers (proves withTenantTx writes serve)
        run: bun run db:reseed
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase

      - name: api-ts logs (always)
        if: always()
        run: tail -200 /tmp/api-drift.log || true

      - name: Stop api-ts
        if: always()
        run: kill "$(cat /tmp/api-drift.pid)" || true

  duplicate-op-check:
    name: No Duplicate OperationId
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Fail if routes.ts registers the same operationId or path twice
        run: cd services/api-ts && bun run check:duplicate-ops

  traceability:
    name: BR Traceability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Check P0 BR coverage
        run: bun run audit:trace:ci

  coverage-ratchet:
    name: Coverage Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The computed verification engine (verify-app Tier 0). Regenerates all 6
    # coverage matrices from machine-readable sources and enforces the gates:
    #   - role-op drift HARD-fails (must be 0; the PHI-leak / broken-authz class)
    #   - endpoint/fsm/workflow/fe-route RATCHET (fail only on NEW gaps vs the
    #     committed *.allowlist.json baselines)
    #   - br is REPORT-ONLY for now (its P0s are traceability gaps pending triage;
    #     audit:trace:ci above remains the P0 gate meanwhile)
    # No DB/server — pure static analysis. role-op + endpoint need contract-spine.json
    # (gitignored), so we regenerate it offline first (build-contract-spine skips the
    # heavy knowledge-graph injection when the graph is absent).
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Build the OpenAPI spec + codegen (inputs to the contract spine)
        run: |
          cd specs/api && bun run build
          cd ../../services/api-ts && bun run generate
      - name: Regenerate the contract spine (offline — no knowledge graph)
        run: bun scripts/build-contract-spine.ts
      - name: Coverage engine + verify-app verdict-logic unit tests
        run: bun test ./scripts/coverage/ ./scripts/verify-app.test.ts
      - name: Run all coverage matrices + enforce gates
        run: bun run coverage:all:ci
      - name: Fail if committed coverage matrices are stale (regen-drift freshness gate)
        # The previous step regenerated every matrix from the truth sources. If the
        # committed artifacts under docs/testing/coverage/ differ from that fresh
        # regen, the engine's findings have silently drifted from what reviewers see
        # in the PR. Generation is byte-deterministic across runtimes (codepoint
        # sorts, no Date/random in output), so any diff here is real staleness.
        run: |
          if ! git diff --exit-code -- docs/testing/coverage; then
            echo "::error::Committed coverage matrices are STALE vs a fresh regen."
            echo "Run 'bun run coverage:all' locally and commit docs/testing/coverage/."
            exit 1
          fi
      - name: Ledger coverage ratchet (user-reachable workflows, ADVISORY)
        # Grades the full coverage-ledger surface (915 items) across be-unit /
        # contract / fe-unit / e2e and ratchets the user-reachable gaps against
        # docs/testing/coverage/ledger.allowlist.json (shrink-only). REPORT-ONLY:
        # deterministic detection has known false positives (grep is blind to
        # buildTestApp route-only be-unit tests; the e2e spec-index is a fuzzy
        # match — the Phase 1 LLM verify found ~29% of raw e2e candidates were
        # actually covered). Promote to blocking once detection is hardened
        # (recorder-in-CI) AND branch protection is enabled. Runs AFTER the
        # freshness gate so its regen never perturbs that diff.
        run: bun run coverage:ledger:check

  module-boundaries:
    name: Module Boundary Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      # Fail the build on any cross-module repository-import boundary violation
      # (domain isolation). Static check — no DB/server needed.
      - name: Check cross-module repo boundaries
        run: cd services/api-ts && bun run check:boundaries

  secret-logging:
    name: Secret Logging Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Tier-0 security gate (verify-app). Fails if a secret reaches a log under a
    # key the pino redactor won't catch (e.g. the verified Stripe-key-in-log P0)
    # or a high-confidence secret literal is committed. Pure static scan — no DB.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Secret-logging unit tests
        run: bun test scripts/check-secret-logging.test.ts
      - name: Scan for secrets reaching logs / committed secret literals
        run: bun run check:secret-logging

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # 40m: the broad ~70-spec chromium sweep runs sequentially (workers:1, by
    # design — the specs share one seeded DB and aren't parallel-safe), so at 25m
    # it was being CANCELLED mid-suite. 40m lets it finish. Combined with
    # --retries=0 below (this non-blocking sweep doesn't need the retry-stabilized
    # signal — the Journey Harness provides that), which roughly halves the time
    # otherwise spent re-running the infra-absent failures.
    timeout-minutes: 40
    # The desktop (chromium) Playwright suite against a REAL backend (postgres +
    # api-ts + MinIO + demo seed), mirroring the journey/iPad jobs. Previously this
    # job had no DB, so the Playwright webServer (which boots api-ts) crashed and the
    # whole suite errored. journey-verification (below) remains the AUTHORITATIVE
    # hard-fail E2E gate (20 curated journeys); this broad ~70-spec suite is kept
    # continue-on-error because a subset depends on infra not provisioned here
    # (Stripe/Mailpit), so those specs fail non-blocking. Drop continue-on-error
    # once the suite is green end-to-end in CI. (iPad projects run in their own job.)
    continue-on-error: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: e2e-test-secret-do-not-use-in-prod
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile

      # api-ts imports the generated OpenAPI document at runtime — build the spec +
      # codegen first or the API exits "Cannot find module '@monobase/api-spec/openapi.json'".
      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build
      - name: Generate API codegen
        run: cd services/api-ts && bun run generate
      - name: Install Playwright browsers
        run: cd apps/dentalemon && bunx playwright install --with-deps chromium

      - name: Start MinIO
        run: |
          docker run -d \
            -p 9000:9000 \
            --name minio \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data
          for i in {1..20}; do
            curl -fsS http://localhost:9000/minio/health/live && break || sleep 1
          done

      - name: Boot api-ts (auto-migrates on start)
        run: |
          cd services/api-ts
          bun dev > /tmp/api-e2e.log 2>&1 &
          echo $! > /tmp/api-e2e.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && break || sleep 1
          done
          curl -fsS "$API_URL/livez" || { echo "api-ts never became ready"; tail -100 /tmp/api-e2e.log; exit 1; }

      - name: Seed demo data
        run: bun run db:reseed
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase

      # Chromium only — the Playwright API webServer reuses the api-ts booted above
      # (reuseExistingServer:true) and boots Vite on :3003. iPad projects run separately.
      # --retries=0: this non-blocking sweep doesn't need the retry-stabilized signal
      # (the Journey Harness is the authoritative gate); skipping the retry roughly
      # halves the time spent re-running specs that fail for absent infra (Stripe/Mailpit).
      - name: Run E2E tests (chromium)
        run: cd apps/dentalemon && bunx playwright test --project=chromium --retries=0

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: apps/dentalemon/test-results/
          retention-days: 7

      - name: api-ts logs (always)
        if: always()
        run: tail -200 /tmp/api-e2e.log || true

      - name: Stop api-ts
        if: always()
        run: kill "$(cat /tmp/api-e2e.pid)" || true

  perf-ratchet:
    name: Performance Ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # DISABLED until a staging environment is wired. The ratchet needs a
    # running, seeded API to hit. To enable:
    #   1. Change `if: false` -> `if: github.event_name == 'pull_request'`.
    #   2. Set repo secrets PERF_API_URL and PERF_API_TOKEN.
    #   3. Provide PERF_PATIENT_ID / PERF_VISIT_ID / PERF_CHART_ID via env
    #      or seed deterministic IDs in the staging env.
    # Until then the job exists as scaffolding so the script and baseline
    # stay version-controlled and reviewable.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install --frozen-lockfile
      - name: Run perf ratchet
        run: cd services/api-ts && bun run tests/perf/run.ts
        env:
          API_URL: ${{ secrets.PERF_API_URL }}
          API_TOKEN: ${{ secrets.PERF_API_TOKEN }}

  journey-verification:
    name: Journey Harness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # The harness needs a real database (seed + api-ts) and the Vite frontend
    # (Playwright webServer boots it). No MinIO needed — journeys don't touch storage.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: journey-test-secret-do-not-use-in-prod
      # Minimal storage config so api-ts boots without crashing (journeys don't upload files)
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/dentalemon && bunx playwright install --with-deps chromium

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Boot api-ts (auto-migrates on start)
        run: |
          cd services/api-ts
          bun dev > /tmp/api-journey.log 2>&1 &
          echo $! > /tmp/api-journey.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && break || sleep 1
          done
          curl -fsS "$API_URL/livez" || { echo "api-ts never became ready"; tail -100 /tmp/api-journey.log; exit 1; }

      - name: Seed demo data
        run: bun run db:reseed
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase

      - name: Run journey harness (gated journeys, no-reseed — data already seeded)
        # This is THE armed real-stack lock (Plan C). It runs against a from-zero-
        # migrated DB: the empty postgres service above is auto-migrated on api-ts
        # boot, then seeded once. No `continue-on-error` — a regression hard-fails.
        # Exit code: 0 = all PASS-expected journeys returned PASS and no specs crashed.
        # Exit 1 = any PASS-expected journey returned BROKEN/ERROR (regression), OR any
        #   spec crashed, OR a CORE journey SKIPPED (a silent core-flow skip — the
        #   "broken for users while green" class this gate exists to kill).
        # SKIPPED is tolerated ONLY for the skip-allowed ceph journeys (B01–B04), which
        #   need MinIO (absent here) for a seeded image. BROKEN-expected journeys
        #   returning BROKEN are OK; returning PASS (a fix!) is logged, not blocking.
        run: bun apps/dentalemon/scripts/run-journey-harness.ts --no-reseed

      - name: Upload journey results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: journey-results
          path: |
            apps/dentalemon/journey-results.json
            apps/dentalemon/.journey-tmp/
          retention-days: 14

      - name: Upload Playwright artifacts (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: journey-playwright-artifacts
          path: apps/dentalemon/test-results/
          retention-days: 7

      - name: api-ts logs (always)
        if: always()
        run: tail -200 /tmp/api-journey.log || true

      - name: Stop api-ts
        if: always()
        run: kill "$(cat /tmp/api-journey.pid)" || true

  ipad-device-coverage:
    name: iPad Device Coverage (perio)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # FIX-007 (dental-perio Batch C): the iPad perio layout spec
    # (apps/dentalemon/tests/e2e/ipad-perio-charting.spec.ts) is wired into the
    # `test:e2e` project matrix (ipad-portrait / ipad-landscape) and passes
    # locally, but the `e2e` job above has NO database, so the spec's UI self-seed
    # throws and the device assertions SILENTLY SKIP — the coverage claim was
    # overstated. This job gives it a real postgres + api-ts (mirroring
    # journey-verification) and runs ONLY the iPad projects (which match
    # `ipad-*.spec.ts`), so the 1024×768 grid + 44px tap-target assertions
    # actually execute in CI. The spec self-seeds via the sign-up UI, so no
    # `db:reseed` is needed.
    #
    # HARD GATE: confirmed green on webkit-on-ubuntu (runs 27474790132 / main push
    # 27475408926) after fix(calendar) #6 removed the iPad-portrait horizontal
    # overflow. `continue-on-error` dropped + this check is required in branch
    # protection. (The earlier failure was a real /calendar overflow plus a render-
    # timing flake on the un-waited scrollWidth measure; both resolved by #6.)

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monobase
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d monobase"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/monobase
      PORT: 7213
      API_URL: http://localhost:7213
      AUTH_SECRET: ipad-perio-test-secret-do-not-use-in-prod
      # Minimal storage config so api-ts boots without crashing (perio is manual
      # chart data — no image bytes / MinIO needed).
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_BUCKET: monobase-files
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      # iPad device descriptors (`devices['iPad (gen 7)']`) run on webkit.
      - name: Install Playwright browsers (webkit)
        run: cd apps/dentalemon && bunx playwright install --with-deps webkit

      - name: Build the OpenAPI spec
        run: cd specs/api && bun run build

      - name: Generate API codegen
        run: cd services/api-ts && bun run generate

      - name: Boot api-ts (auto-migrates on start)
        run: |
          cd services/api-ts
          bun dev > /tmp/api-ipad.log 2>&1 &
          echo $! > /tmp/api-ipad.pid

      - name: Wait for /livez
        run: |
          for i in {1..60}; do
            curl -fsS "$API_URL/livez" && break || sleep 1
          done
          curl -fsS "$API_URL/livez" || { echo "api-ts never became ready"; tail -100 /tmp/api-ipad.log; exit 1; }

      # The Playwright webServer reuses the api-ts booted above (reuseExistingServer)
      # and boots the Vite app on :3003. The iPad spec self-seeds via the sign-up UI.
      - name: Run iPad perio device specs
        run: cd apps/dentalemon && bunx playwright test --project=ipad-portrait --project=ipad-landscape

      - name: Upload iPad Playwright artifacts (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ipad-playwright-artifacts
          path: apps/dentalemon/test-results/
          retention-days: 7

      - name: api-ts logs (always)
        if: always()
        run: tail -200 /tmp/api-ipad.log || true

      - name: Stop api-ts
        if: always()
        run: kill "$(cat /tmp/api-ipad.pid)" || true
