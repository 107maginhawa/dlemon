# Bun configuration for the account app

[test]
# Exclude E2E tests from Bun test runner
# E2E tests are run with Playwright: bun run test:e2e
# Bun runs unit tests (src/**/*.test.ts)
# Playwright runs E2E tests (tests/e2e/**/*.spec.ts)
ignore = ["**/*.spec.ts", "tests/**", "tests/e2e/**"]
root = "./src"

# Use bun's native happy-dom environment instead of GlobalRegistrator preload.
# GlobalRegistrator.register() keeps the event loop alive after tests finish,
# causing `bun test` to hang indefinitely. The native env handles teardown.
preload = ["./src/test-setup.ts"]

# Coverage reporting (G6-S9: 75% line/function gate, 60% branch)
coverage = true
coverageReporter = ["text", "lcov"]
coverageDir = "./coverage"
coverageThreshold = { line = 75, function = 75, branch = 60 }
