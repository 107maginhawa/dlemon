[install]
# Use isolated mode (pnpm-style) for strict dependency isolation
linker = "isolated"

# Install packages to individual package node_modules directories
# This ensures better isolation between packages
cache = true

# Skip optional dependencies for faster installs
optional = false

# Logging configuration
logLevel = "info"

[test]
# Preload happy-dom so React Testing Library component tests have window/document
# when run via `bun test` from the monorepo root. Wrapped in try/catch so
# backend tests (services/api-ts) that don't need a DOM are unaffected.
preload = ["./test-setup.ts"]
